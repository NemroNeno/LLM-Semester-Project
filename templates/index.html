<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banking RAG Chat</title>
    <style>
        :root {
            --bg: #e6f0fa;
            --bg-accent: #cce0ff;
            --panel: rgba(255, 255, 255, 0.95);
            --text: #0b1a2e;
            --muted: #4a6585;
            --brand: #0f4c81;
            --brand-deep: #0a3153;
            --user: #dce7f3;
            --assistant: #eaf1fa;
            --border: rgba(15, 76, 129, 0.15);
            --shadow: 0 10px 40px rgba(10, 49, 83, 0.1);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", Arial, sans-serif;
            color: var(--text);
            background: linear-gradient(135deg, var(--bg) 0%, #ffffff 50%, var(--bg-accent) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .shell {
            width: min(1000px, 100%);
            min-height: min(800px, calc(100vh - 40px));
            display: grid;
            grid-template-columns: 280px 1fr;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .sidebar {
            padding: 24px;
            background: linear-gradient(180deg, var(--brand), var(--brand-deep));
            color: #ffffff;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .sidebar button.new-chat {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 1px solid rgba(255,255,255,0.4);
            border-radius: 8px;
            padding: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        
        .sidebar button.new-chat:hover { background: rgba(255,255,255,0.3); }

        .chat-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            font-size: 14px;
        }
        .chat-item {
            padding: 8px;
            border-radius: 6px;
            cursor: pointer;
            background: rgba(255,255,255,0.05);
            transition: 0.2s;
        }
        .chat-item:hover { background: rgba(255,255,255,0.15); }
        .chat-item.active { background: rgba(255,255,255,0.25); font-weight: bold; }

        .eyebrow { font-size: 12px; opacity: 0.8; text-transform: uppercase; letter-spacing: 0.1em; }
        h1 { margin: 0; font-size: 1.5rem; }

        .panel { display: flex; flex-direction: column; min-height: 100%; position: relative; }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            max-width: 80%; padding: 12px 16px; border-radius: 12px;
            line-height: 1.5; white-space: pre-wrap;
            border: 1px solid var(--border); animation: rise 0.2s ease-out;
            position: relative;
        }
        .message.user { align-self: flex-end; background: var(--user); border-bottom-right-radius: 4px; }
        .message.assistant { align-self: flex-start; background: var(--assistant); border-bottom-left-radius: 4px; }

        .sources {
            font-size: 11px; color: var(--brand);
            background: rgba(15, 76, 129, 0.1); padding: 4px 8px;
            border-radius: 12px; margin-top: 8px; display: inline-block; cursor: pointer;
        }

        .composer { padding: 16px 24px; border-top: 1px solid var(--border); background: #ffffff; }
        form { display: grid; grid-template-columns: 1fr auto; gap: 12px; }
        textarea {
            width: 100%; min-height: 48px; max-height: 150px; resize: vertical;
            border-radius: 12px; border: 1px solid var(--border);
            padding: 12px; font-family: inherit; font-size: 14px;
        }
        button[type="submit"] {
            border: 0; border-radius: 12px; padding: 0 20px;
            background: var(--brand); color: white; font-weight: bold; cursor: pointer;
        }
        button[type="submit"]:disabled { opacity: 0.5; cursor: wait; }

        .loading { display: none; padding: 10px; font-size: 13px; color: var(--brand); font-style: italic; align-self: flex-start;}
        .loading.visible { display: block; }
        
        @keyframes rise { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <main class="shell">
        <aside class="sidebar">
            <div class="eyebrow">NUST Bank</div>
            <h1>Smart Banking Assistant</h1>
            <button class="new-chat" id="new-chat-btn">+ New Chat</button>
            <div class="chat-list" id="chat-list">
                <!-- Chat list dynamically populated -->
            </div>
            
            <section class="meta" style="margin-top: auto">
                <div class="meta-item">
                    <strong>Model</strong>
                    <span>{{ chat_model }}</span>
                </div>
            </section>
        </aside>

        <section class="panel">
            <div id="messages" class="messages">
                <div class="message assistant">Hello! I am the NUST Bank assistant. How can I help you today?</div>
            </div>
            <div id="loading" class="loading">Processing...</div>

            <div class="composer">
                <form id="chat-form">
                    <textarea id="message-input" name="message" placeholder="Ask about banking products, fees, accounts..." required></textarea>
                    <button id="send-button" type="submit">Send</button>
                </form>
            </div>
        </section>
    </main>

    <script>
        const form = document.getElementById("chat-form");
        const input = document.getElementById("message-input");
        const button = document.getElementById("send-button");
        const messages = document.getElementById("messages");
        const loading = document.getElementById("loading");
        const chatList = document.getElementById("chat-list");
        const newChatBtn = document.getElementById("new-chat-btn");

        let currentChatId = null;

        function addMessage(role, text, contextCount = 0) {
            const element = document.createElement("div");
            element.className = `message ${role}`;
            
            const textNode = document.createElement("div");
            textNode.textContent = text;
            element.appendChild(textNode);
            
            if (role === "assistant" && contextCount > 0) {
                const sources = document.createElement("div");
                sources.className = "sources";
                sources.textContent = `ⓘ ${contextCount} Source(s) used from RAG`;
                sources.title = "Answer generated using RAG banking data references";
                element.appendChild(sources);
            }
            
            messages.appendChild(element);
            messages.scrollTop = messages.scrollHeight;
        }

        async function loadChats() {
            try {
                const res = await fetch("/chats");
                const chats = await res.json();
                chatList.innerHTML = "";
                chats.forEach(chat => {
                    const el = document.createElement("div");
                    el.className = `chat-item ${chat.id === currentChatId ? 'active' : ''}`;
                    el.textContent = chat.title;
                    el.onclick = () => loadChatHistory(chat.id);
                    chatList.appendChild(el);
                });
            } catch (e) { console.error("Could not load chats"); }
        }

        async function loadChatHistory(chatId) {
            currentChatId = chatId;
            messages.innerHTML = "";
            try {
                const res = await fetch(`/chats/${chatId}/messages`);
                const history = await res.json();
                history.forEach(m => addMessage(m.role, m.content, m.context_count));
                await loadChats(); // Update active class
            } catch (e) {
                messages.innerHTML = '<div class="message assistant">Failed to load history.</div>';
            }
        }

        newChatBtn.onclick = () => {
            currentChatId = null;
            messages.innerHTML = '<div class="message assistant">Hello! I am the NUST Bank assistant. How can I help you today?</div>';
            loadChats();
        };

        async function sendMessage(message) {
            loading.classList.add("visible");
            button.disabled = true;

            try {
                const response = await fetch("/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message, chat_id: currentChatId }),
                });

                const payload = await response.json();

                if (!response.ok) {
                    throw new Error(payload.detail || "Request failed.");
                }

                currentChatId = payload.chat_id;
                addMessage("assistant", payload.reply, payload.context_count);
                await loadChats();
            } catch (error) {
                addMessage("assistant", `Error: ${error.message}`);
            } finally {
                loading.classList.remove("visible");
                button.disabled = false;
                input.focus();
            }
        }

        form.addEventListener("submit", async (event) => {
            event.preventDefault();
            const message = input.value.trim();
            if (!message) return;

            addMessage("user", message);
            input.value = "";
            await sendMessage(message);
        });

        // initial load
        loadChats();
    </script>
</body>
</html>
