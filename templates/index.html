<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banking RAG Chat</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg: #e6f0fa;
            --bg-accent: #cce0ff;
            --panel: rgba(255, 255, 255, 0.95);
            --text: #0b1a2e;
            --muted: #4a6585;
            --brand: #0f4c81;
            --brand-deep: #0a3153;
            --user: #dce7f3;
            --assistant: #eaf1fa;
            --border: rgba(15, 76, 129, 0.15);
            --shadow: 0 10px 40px rgba(10, 49, 83, 0.1);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", Arial, sans-serif;
            color: var(--text);
            background: linear-gradient(135deg, var(--bg) 0%, #ffffff 50%, var(--bg-accent) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .shell {
            width: min(1000px, 100%);
            height: 800px;
            max-height: calc(100vh - 40px);
            display: grid;
            grid-template-columns: 280px 1fr;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .sidebar {
            padding: 24px;
            background: linear-gradient(180deg, var(--brand), var(--brand-deep));
            color: #ffffff;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .sidebar button.new-chat {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 1px solid rgba(255,255,255,0.4);
            border-radius: 8px;
            padding: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        
        .sidebar button.new-chat:hover { background: rgba(255,255,255,0.3); }

        .chat-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            font-size: 14px;
        }
        .chat-item {
            padding: 8px;
            border-radius: 6px;
            cursor: pointer;
            background: rgba(255,255,255,0.05);
            transition: 0.2s;
        }
        .chat-item:hover { background: rgba(255,255,255,0.15); }
        .chat-item.active { background: rgba(255,255,255,0.25); font-weight: bold; }

        .eyebrow { font-size: 12px; opacity: 0.8; text-transform: uppercase; letter-spacing: 0.1em; }
        h1 { margin: 0; font-size: 1.5rem; }

        .panel { display: flex; flex-direction: column; height: 100%; overflow: hidden; position: relative; }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            max-width: 80%; padding: 12px 16px; border-radius: 12px;
            line-height: 1.5;
            border: 1px solid var(--border); animation: rise 0.2s ease-out;
            position: relative;
        }
        .message.user { align-self: flex-end; background: var(--user); border-bottom-right-radius: 4px; white-space: pre-wrap; }
        .message.assistant { align-self: flex-start; background: var(--assistant); border-bottom-left-radius: 4px; }
        
        .message p { margin: 0 0 10px 0; }
        .message p:last-child { margin: 0; }
        .message pre { background: rgba(0,0,0,0.05); padding: 10px; border-radius: 6px; overflow-x: auto; margin: 10px 0; }
        .message code { background: rgba(0,0,0,0.05); padding: 2px 4px; border-radius: 4px; font-family: monospace; font-size: 0.9em; }
        .message ul, .message ol { margin: 10px 0; padding-left: 20px; }

        .sources-dropdown {
            margin-top: 10px;
            border: 1px solid rgba(15, 76, 129, 0.2);
            border-radius: 10px;
            background: rgba(15, 76, 129, 0.06);
            overflow: hidden;
        }

        .sources-summary {
            font-size: 12px;
            color: var(--brand-deep);
            cursor: pointer;
            padding: 8px 10px;
            font-weight: 600;
            list-style: none;
            user-select: none;
        }

        .sources-summary::-webkit-details-marker { display: none; }
        .sources-summary::before {
            content: "▸";
            margin-right: 8px;
            display: inline-block;
            transition: transform 0.2s ease;
        }

        details[open] > .sources-summary::before {
            transform: rotate(90deg);
        }

        .sources-list {
            border-top: 1px solid rgba(15, 76, 129, 0.15);
            padding: 8px;
            display: grid;
            gap: 8px;
            max-height: 220px;
            overflow-y: auto;
        }

        .source-item {
            margin: 0;
            white-space: pre-wrap;
            word-break: break-word;
            font-size: 12px;
            line-height: 1.4;
            color: var(--text);
            background: rgba(255, 255, 255, 0.65);
            border: 1px solid rgba(15, 76, 129, 0.1);
            border-radius: 8px;
            padding: 8px;
        }

        .composer { padding: 16px 24px; border-top: 1px solid var(--border); background: #ffffff; }
        form { display: grid; grid-template-columns: 1fr auto; gap: 12px; }
        textarea {
            width: 100%; min-height: 48px; max-height: 150px; resize: vertical;
            border-radius: 12px; border: 1px solid var(--border);
            padding: 12px; font-family: inherit; font-size: 14px;
        }
        button[type="submit"] {
            border: 0; border-radius: 12px; padding: 0 20px;
            background: var(--brand); color: white; font-weight: bold; cursor: pointer;
        }
        button[type="submit"]:disabled { opacity: 0.5; cursor: wait; }

        .loading { display: none; padding: 0 24px 16px 24px; align-self: flex-start; }
        .loading.visible { display: block; }
        .typing-indicator {
            display: inline-flex; gap: 4px; padding: 12px 16px;
            background: var(--assistant); border-radius: 12px; border-bottom-left-radius: 4px;
            border: 1px solid var(--border);
        }
        .typing-indicator span {
            width: 6px; height: 6px; background: var(--brand); border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
        
        @keyframes rise { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <main class="shell">
        <aside class="sidebar">
            <div class="eyebrow">NUST Bank</div>
            <h1>Smart Banking Assistant</h1>
            <button class="new-chat" id="new-chat-btn">+ New Chat</button>
            <div class="chat-list" id="chat-list">
                <!-- Chat list dynamically populated -->
            </div>
            
            <section class="meta" style="margin-top: auto">
                <div class="meta-item">
                    <strong>Model Provider</strong>
                    <select id="provider-select" style="width: 100%; padding: 6px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.4); background: rgba(255,255,255,0.1); color: white; margin-top: 4px;">
                        <option value="openrouter" style="color: black;" {% if chat_provider == 'openrouter' %}selected{% endif %}>OpenRouter (Qwen-2.5-7b)</option>
                        <option value="ollama" style="color: black;" {% if chat_provider == 'ollama' %}selected{% endif %}>Local Ollama (Qwen2.5-3b-instruct)</option>
                    </select>
                </div>
            </section>
        </aside>

        <section class="panel">
            <div id="messages" class="messages">
                <div class="message assistant">Hello! I am the NUST Bank assistant. How can I help you today?</div>
            </div>
            <div id="loading" class="loading">
                <div class="typing-indicator"><span></span><span></span><span></span></div>
            </div>

            <div class="composer">
                <form id="chat-form">
                    <textarea id="message-input" name="message" placeholder="Ask about banking products, fees, accounts..." required></textarea>
                    <button id="send-button" type="submit">Send</button>
                </form>
            </div>
        </section>
    </main>

    <script>
        const form = document.getElementById("chat-form");
        const input = document.getElementById("message-input");
        const button = document.getElementById("send-button");
        const messages = document.getElementById("messages");
        const loading = document.getElementById("loading");
        const chatList = document.getElementById("chat-list");
        const newChatBtn = document.getElementById("new-chat-btn");
        const providerSelect = document.getElementById("provider-select");

        let currentChatId = null;

        function addMessage(role, text, contextCount = 0, ragReferences = []) {
            const element = document.createElement("div");
            element.className = `message ${role}`;
            
            const textNode = document.createElement("div");
            if (role === "assistant") {
                textNode.innerHTML = marked.parse(text);
            } else {
                textNode.textContent = text;
            }
            element.appendChild(textNode);
            
            if (role === "assistant" && contextCount > 0 && ragReferences.length > 0) {
                const details = document.createElement("details");
                details.className = "sources-dropdown";

                const summary = document.createElement("summary");
                summary.className = "sources-summary";
                summary.textContent = `${contextCount} RAG source(s) used`;

                const sourcesList = document.createElement("div");
                sourcesList.className = "sources-list";

                ragReferences.forEach((reference, index) => {
                    const sourceItem = document.createElement("pre");
                    sourceItem.className = "source-item";
                    sourceItem.textContent = `Source ${index + 1}\n${reference}`;
                    sourcesList.appendChild(sourceItem);
                });

                details.appendChild(summary);
                details.appendChild(sourcesList);
                element.appendChild(details);
            }
            
            messages.appendChild(element);
            messages.scrollTop = messages.scrollHeight;
        }

        async function loadChats() {
            try {
                const res = await fetch("/chats");
                const chats = await res.json();
                chatList.innerHTML = "";
                chats.forEach(chat => {
                    const el = document.createElement("div");
                    el.className = `chat-item ${chat.id === currentChatId ? 'active' : ''}`;
                    el.textContent = chat.title;
                    el.onclick = () => loadChatHistory(chat.id);
                    chatList.appendChild(el);
                });
            } catch (e) { console.error("Could not load chats"); }
        }

        async function loadChatHistory(chatId) {
            currentChatId = chatId;
            messages.innerHTML = "";
            try {
                const res = await fetch(`/chats/${chatId}/messages`);
                const history = await res.json();
                history.forEach(m => addMessage(m.role, m.content, m.context_count, m.rag_references || []));
                await loadChats(); // Update active class
            } catch (e) {
                messages.innerHTML = '<div class="message assistant">Failed to load history.</div>';
            }
        }

        newChatBtn.onclick = () => {
            currentChatId = null;
            messages.innerHTML = '<div class="message assistant">Hello! I am the NUST Bank assistant. How can I help you today?</div>';
            loadChats();
        };

        async function sendMessage(message) {
            loading.classList.add("visible");
            messages.scrollTop = messages.scrollHeight;
            button.disabled = true;

            const provider = providerSelect.value;

            try {
                const response = await fetch("/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message, chat_id: currentChatId, provider }),
                });

                const payload = await response.json();

                if (!response.ok) {
                    throw new Error(payload.detail || "Request failed.");
                }

                currentChatId = payload.chat_id;
                addMessage("assistant", payload.reply, payload.context_count, payload.rag_references || []);
                await loadChats();
            } catch (error) {
                addMessage("assistant", `Error: ${error.message}`);
            } finally {
                loading.classList.remove("visible");
                button.disabled = false;
                input.focus();
            }
        }

        input.addEventListener("keydown", (event) => {
            if (event.key === "Enter" && !event.shiftKey) {
                event.preventDefault();
                button.click();
            }
        });

        form.addEventListener("submit", async (event) => {
            event.preventDefault();
            const message = input.value.trim();
            if (!message) return;

            addMessage("user", message);
            input.value = "";
            await sendMessage(message);
        });

        // initial load
        loadChats();
    </script>
</body>
</html>
